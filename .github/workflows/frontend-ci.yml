name: Frontend CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ "dev" ]
    paths:
      - "frontend/**"

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Lint check
        run: npm run lint

      - name: Build Frontend
        run: npm run build