services:
  db:
    image: mysql:8.0
    container_name: issue-tracker-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: issue_tracker
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - issue-network

networks:
  issue-network:
    driver: bridge