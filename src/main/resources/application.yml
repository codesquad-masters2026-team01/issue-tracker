spring:
  datasource:
    url: jdbc:mysql://localhost:3306/issue_tracker?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root # 도커 설정과 동일하게!
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always # 애플리케이션 실행 시마다 schema.sql을 실행하게 설정

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG # 실행되는 SQL을 로그로 확인